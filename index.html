<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-emerald-50 text-slate-800 h-full">

    <div class="max-w-md mx-auto h-full flex flex-col bg-white shadow-2xl">
        <!-- Header -->
        <header class="bg-emerald-500 text-white p-6 rounded-b-[2rem]">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-emerald-100 text-sm">Bom dia,</p>
                    <h1 class="text-xl font-bold">Olá, Usuário</h1>
                </div>
                <button class="bg-emerald-600 p-2 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </button>
            </div>

            <!-- Balance Card -->
            <div class="bg-white text-slate-800 p-6 rounded-2xl shadow-lg">
                <p class="text-slate-500 text-sm">Saldo Total</p>
                <h2 class="text-3xl font-bold mt-1">R$ 7.783,00</h2>
                <div class="flex gap-4 mt-6">
                    <div class="flex-1">
                        <p class="text-slate-400 text-xs">Entradas</p>
                        <p class="text-emerald-500 font-semibold text-lg">+ R$ 4.000,00</p>
                    </div>
                    <div class="flex-1">
                        <p class="text-slate-400 text-xs">Saídas</p>
                        <p class="text-red-500 font-semibold text-lg">- R$ 1.187,40</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <h3 class="text-lg font-bold mb-4">Lançamentos Recentes</h3>
            
            <div class="space-y-4">
                <!-- Item -->
                <div class="flex items-center gap-4 bg-emerald-50 p-3 rounded-2xl">
                    <div class="bg-blue-100 p-3 rounded-xl text-blue-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold">Salário</p>
                        <p class="text-xs text-slate-400">18:27 - 30 Abr</p>
                    </div>
                    <p class="font-bold text-slate-700">R$ 4.000,00</p>
                </div>

                <!-- Item -->
                <div class="flex items-center gap-4 bg-emerald-50 p-3 rounded-2xl">
                    <div class="bg-orange-100 p-3 rounded-xl text-orange-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold">Supermercado</p>
                        <p class="text-xs text-slate-400">17:00 - 24 Abr</p>
                    </div>
                    <p class="font-bold text-red-500">- R$ 100,00</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="flex justify-around p-4 border-t border-slate-100">
            <button class="text-emerald-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></button>
            <button class="text-slate-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></button>
            <button class="bg-emerald-500 p-4 rounded-full text-white -mt-10 shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></button>
            <button class="text-slate-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></button>
            <button class="text-slate-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
        </nav>
    </div>

</body>
</html>
