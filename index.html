<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Inteligente</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Plus Jakarta Sans para aspecto premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Ocultar barra de rolagem mas manter a funcionalidade de scroll ativa */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B]">
    <div id="root"></div>

    <!-- Bibliotecas de suporte do React e Babel no browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Paletas de cores suaves (Tons Pastel) baseadas nas marcas dos principais bancos brasileiros
        const BANK_THEMES = {
            'Itaú': { bg: 'bg-[#FFF2E6]', border: 'border-[#FFD9B3]', text: 'text-[#8A4F00]', accent: '#FF8000' },
            'Nubank': { bg: 'bg-[#F3E8FF]', border: 'border-[#E9D5FF]', text: 'text-[#6B21A8]', accent: '#8B5CF6' },
            'Bradesco': { bg: 'bg-[#FFF0F2]', border: 'border-[#FFD1D7]', text: 'text-[#9F1239]', accent: '#F43F5E' },
            'Santander': { bg: 'bg-[#FEF2F2]', border: 'border-[#FEE2E2]', text: 'text-[#991B1B]', accent: '#EF4444' },
            'Inter': { bg: 'bg-[#FFF7ED]', border: 'border-[#FFEDD5]', text: 'text-[#9A3412]', accent: '#F97316' },
            'Caixa': { bg: 'bg-[#F0F9FF]', border: 'border-[#E0F2FE]', text: 'text-[#075985]', accent: '#0284C7' },
            'Banco do Brasil': { bg: 'bg-[#FEFCE8]', border: 'border-[#FEF9C3]', text: 'text-[#713F12]', accent: '#CA8A04' },
            'Sicredi': { bg: 'bg-[#F0FDF4]', border: 'border-[#DCFCE7]', text: 'text-[#166534]', accent: '#16A34A' },
            'Default': { bg: 'bg-[#F1F5F9]', border: 'border-[#E2E8F0]', text: 'text-[#334155]', accent: '#64748B' }
        };

        // Ícones em SVG inline puro para garantir que nunca quebrem ou fiquem invisíveis
        const ICONS = {
            wallet: <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 12V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2v-4M21 12H13m8 0a2 2 0 01-2 2h-6a2 2 0 01-2-2m8 0a2 2 0 00-2-2h-6a2 2 0 00-2 2"/></svg>,
            dashboard: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z"/><path strokeLinecap="round" strokeLinejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z"/></svg>,
            lancamentos: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-12L21 9m0 0l-4.5 4.5M21 9H7.5"/></svg>,
            cartoes: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
            configuracoes: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/></svg>,
            lixeira: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.100 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>,
            magic: <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3 15l5.096-.813L9 9l.813 5.096L15 15l-5.187.904zM18 5.25L17.25 8l-.75-2.75L13.75 4.5l2.75-.75L17.25 1l.75 2.75 2.75.75-2.75.75zM19 14.25l-.75 2.75-.75-2.75-2.75-.75 2.75-.75.75-2.75.75 2.75 2.75.75-2.75.75z"/></svg>,
            plus: <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>,
            arrowUp: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"/></svg>,
            arrowDown: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 4.5l-15 15m0 0h11.25m-11.25 0V8.25"/></svg>,
            vault: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>,
            bank: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 21V10m0 11H7.5m4.5 0h4.5m-9 0V10m9 11V10M3 10h18M3 7l9-4 9 4M4 10h16"/></svg>,
            x: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
            sync: <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [lancamentos, setLancamentos] = useState(() => JSON.parse(localStorage.getItem('cf_lancamentos')) || []);
            const [cartoes, setCartoes] = useState(() => JSON.parse(localStorage.getItem('cf_cartoes')) || []);
            const [categorias, setCategorias] = useState(() => JSON.parse(localStorage.getItem('cf_categorias')) || []);
            const [lixeira, setLixeira] = useState(() => JSON.parse(localStorage.getItem('cf_lixeira')) || []);

            const [sheetsUrl, setSheetsUrl] = useState(() => localStorage.getItem('cf_sheets_url') || '');
            const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem('cf_gemini_key') || '');
            
            const [isSyncing, setIsSyncing] = useState(false);
            const [toast, setToast] = useState(null);
            const [statusConexao, setStatusConexao] = useState('erro'); 
            const [selectedBanco, setSelectedBanco] = useState('Todos');
            
            const [isTrashOpen, setIsTrashOpen] = useState(false);
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [aiInput, setAiInput] = useState('');
            const [isAiAnalyzing, setIsAiAnalyzing] = useState(false);
            const [pendingTx, setPendingTx] = useState(null);

            const [isManualOpen, setIsManualOpen] = useState(false);
            const [manualTx, setManualTx] = useState({
                descricao: '',
                valor: '',
                data: new Date().toISOString().split('T')[0],
                categoria: 'Alimentação',
                banco_conta: '',
                metodo: 'Débito',
                cartao_dono: 'Meu'
            });

            useEffect(() => { localStorage.setItem('cf_lancamentos', JSON.stringify(lancamentos)); }, [lancamentos]);
            useEffect(() => { localStorage.setItem('cf_cartoes', JSON.stringify(cartoes)); }, [cartoes]);
            useEffect(() => { localStorage.setItem('cf_categorias', JSON.stringify(categorias)); }, [categorias]);
            useEffect(() => { localStorage.setItem('cf_lixeira', JSON.stringify(lixeira)); }, [lixeira]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const parseBrazilianNumber = (value) => {
                if (typeof value === 'number') return value;
                if (!value) return 0;
                let clean = value.toString().replace(/R\$\s?/gi, '').trim();
                if (clean.includes('.') && clean.includes(',')) {
                    clean = clean.replace(/\./g, '').replace(',', '.');
                } else if (clean.includes(',')) {
                    clean = clean.replace(',', '.');
                }
                return parseFloat(clean) || 0;
            };

            const syncWithSheets = async () => {
                if (!sheetsUrl) {
                    showToast('Configure a URL do Sheets nas Definições!', 'error');
                    setStatusConexao('erro');
                    return;
                }

                setIsSyncing(true);
                try {
                    const response = await fetch(`${sheetsUrl}?action=getData`);
                    if (!response.ok) throw new Error('Falha de rede');
                    const res = await response.json();
                    
                    if (res.success && res.data) {
                        const sanitizedCartoes = (res.data.cartoes || []).map(c => ({
                            ...c,
                            saldo_inicial: parseBrazilianNumber(c.saldo_inicial)
                        }));

                        setLancamentos(res.data.lancamentos || []);
                        setCartoes(sanitizedCartoes);
                        setCategorias(res.data.config || []);
                        setStatusConexao('conectado');
                        showToast('Dados sincronizados com sucesso!', 'success');
                    } else {
                        throw new Error('Retorno inválido');
                    }
                } catch (err) {
                    console.error(err);
                    setStatusConexao('erro');
                    showToast('Ligação perdida. Verifique o link nas Definições.', 'error');
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => {
                if (sheetsUrl) {
                    syncWithSheets();
                } else {
                    setStatusConexao('erro');
                }
            }, [sheetsUrl]);

            const saveTransaction = async (tx) => {
                const cleanValue = parseBrazilianNumber(tx.valor);
                const finalVal = tx.metodo === 'Receita' ? Math.abs(cleanValue) : -Math.abs(cleanValue);
                
                const localTx = {
                    id: 't_' + Date.now(),
                    ...tx,
                    valor: finalVal,
                    data: tx.data || new Date().toISOString().split('T')[0],
                    parcelamento_id: tx.parcelamento_id || "",
                    parcela_atual: tx.parcela_atual || "",
                    total_parcelas: tx.total_parcelas || ""
                };

                // Atualiza localmente imediato para dar feedback visual rápido
                setLancamentos(prev => [localTx, ...prev]);
                setIsManualOpen(false);
                setIsAiOpen(false);
                setPendingTx(null);

                if (sheetsUrl) {
                    setIsSyncing(true);
                    try {
                        const payload = {
                            action: 'saveTransaction',
                            transactions: [localTx]
                        };
                        
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        showToast('Lançamento guardado na folha de cálculo!', 'success');
                        // Aguarda um pequeno delay para o Sheets processar antes de recarregar
                        setTimeout(() => syncWithSheets(), 1500);
                    } catch (error) {
                        console.error('Erro de rede ao enviar lançamento:', error);
                        showToast('Guardado localmente. Verifique a sua ligação à Internet.', 'error');
                    } finally {
                        setIsSyncing(false);
                    }
                } else {
                    showToast('Guardado no telemóvel (Planilha não configurada).', 'error');
                }
            };

            const deleteTransaction = async (tx) => {
                const updatedLancamentos = lancamentos.filter(l => l.id !== tx.id);
                setLancamentos(updatedLancamentos);

                const itemLixeira = {
                    ...tx,
                    deleted_at: new Date().toLocaleString('pt-BR')
                };
                setLixeira([itemLixeira, ...lixeira]);
                showToast('Lançamento enviado para a lixeira.', 'success');

                if (sheetsUrl) {
                    try {
                        const payload = {
                            action: 'deleteTransaction',
                            id: tx.id
                        };
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        setTimeout(() => syncWithSheets(), 1500);
                    } catch (err) {
                        console.error(err);
                    }
                }
            };

            const clearTrash = async () => {
                setLixeira([]);
                showToast('Lixeira esvaziada permanentemente!', 'success');

                if (sheetsUrl) {
                    try {
                        const payload = { action: 'emptyTrash' };
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } catch (e) {
                        console.error(e);
                    }
                }
            };

            const processTextWithGemini = async (text) => {
                if (!geminiKey) {
                    showToast('Por favor, defina a chave da API do Gemini!', 'error');
                    return;
                }

                setIsAiAnalyzing(true);
                
                const systemPrompt = `Você é um robô de classificação financeira estruturada. Sua resposta deve ser exclusivamente um objeto JSON sem blocos de código markdown ou texto explicativo extra.
                
                Dado o texto digitado pelo usuário, extraia as informações de lançamento financeiro mapeando para o JSON com os seguintes campos:
                {
                  "descricao": "Nome do estabelecimento ou despesa de forma clara (ex: Pizza, Drogaria Araujo, Posto de Combustivel)",
                  "valor": valor numérico decimal correspondente ao gasto,
                  "categoria": "Classifique obrigatoriamente em uma destas: Alimentação, Moradia (Aluguel/Luz/Água), Transporte (Uber/Combustível), Lazer & Hobbies, Saúde & Farmácia, Educação, Vestuário, Assinaturas & Streaming, Salário, Investimentos (Rendimentos) ou Outras Receitas",
                  "banco_conta": "Nome exato da conta ou cartão de destino correspondente na frase do usuário (ex: Itaú Principal, Nubank Roxo, Bradesco Prime, Santander SX, Inter Orange, Caixa Conta, BB Estilo, Sicredi Green)",
                  "metodo": "Metodo de pagamento sendo obrigatoriamente uma destas opções: Crédito, Débito, Pix, Dinheiro ou Receita (use Receita apenas para salários ou ganhos)",
                  "cartao_dono": "Meu"
                }

                Informações importantes para mapeamento inteligente:
                - "tiktok" ou "jogos" classifica como "Lazer & Hobbies".
                - "araujo", "drogaria", "remedio", "farmacia" classifica como "Saúde & Farmácia".
                - Sempre analise o banco citado (ex: "itau", "roxinho", "nu", "nubank", "bradesco") e mapeie para os nomes listados acima.
                - Se não for citado o banco, defina como "Itaú Principal" como padrão.
                - O valor deve ser extraído de forma decimal limpa (ex: "50" ou "50.00").
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: `System Instructions:\n${systemPrompt}` },
                                    { text: `User request: ${text}` }
                                ]
                            }],
                            generationConfig: {
                                responseMimeType: "application/json"
                            }
                        })
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`Erro na API: ${response.status} - ${errText}`);
                    }

                    const resData = await response.json();
                    const rawJsonText = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!rawJsonText) throw new Error('Sem resposta estruturada do Gemini');

                    const cleanParsed = JSON.parse(rawJsonText.trim());
                    
                    setPendingTx({
                        ...cleanParsed,
                        data: new Date().toISOString().split('T')[0]
                    });
                    setAiInput('');
                } catch (error) {
                    console.error("Erro detalhado do processamento do Gemini:", error);
                    showToast('Erro ao processar com o Gemini. Tente usar valores e nomes claros.', 'error');
                } finally {
                    setIsAiAnalyzing(false);
                }
            };

            const filteredLancamentos = lancamentos.filter(l => selectedBanco === 'Todos' || l.banco_conta.includes(selectedBanco));
            
            const totalSaldoInicial = cartoes
                .filter(c => selectedBanco === 'Todos' || c.banco === selectedBanco)
                .reduce((sum, c) => sum + (parseFloat(c.saldo_inicial) || 0), 0);

            const totalEntradas = filteredLancamentos
                .filter(l => parseBrazilianNumber(l.valor) > 0)
                .reduce((sum, l) => sum + parseBrazilianNumber(l.valor), 0);

            const totalSaidas = filteredLancamentos
                .filter(l => parseBrazilianNumber(l.valor) < 0)
                .reduce((sum, l) => sum + Math.abs(parseBrazilianNumber(l.valor)), 0);

            const balancoTotal = totalSaldoInicial + totalEntradas - totalSaidas;

            const activeTheme = selectedBanco !== 'Todos' ? (BANK_THEMES[selectedBanco] || BANK_THEMES.Default) : BANK_THEMES.Default;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-[#F8FAFC] text-[#1E293B]">
                    
                    {/* Feedback Toasts flutuantes */}
                    {toast && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 px-4 py-2.5 rounded-full text-xs font-semibold shadow-lg transition-all duration-300 transform animate-bounce ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-950 text-white'}`}>
                            {toast.type === 'error' ? ICONS.x : ICONS.plus}
                            {toast.message}
                        </div>
                    )}

                    {}
                    {/* Sidebar Clássica de Navegação - Desktop */}
                    <aside className="hidden md:flex w-64 bg-white border-r border-[#E2E8F0] flex-col p-6 shrink-0 justify-between">
                        <div className="space-y-8">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 bg-[#10B981] text-white rounded-lg flex items-center justify-center shadow-sm">
                                    {ICONS.wallet}
                                </div>
                                <div>
                                    <h1 className="font-bold text-sm tracking-tight text-slate-900">Controlo Inteligente</h1>
                                    <p className="text-[10px] text-slate-400 font-medium">Studio DevCompanion</p>
                                </div>
                            </div>

                            <nav className="space-y-1">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: ICONS.dashboard },
                                    { id: 'lancamentos', label: 'Lançamentos', icon: ICONS.lancamentos },
                                    { id: 'cartoes', label: 'Cartões & Contas', icon: ICONS.cartoes },
                                    { id: 'configuracoes', label: 'Definições', icon: ICONS.configuracoes },
                                ].map(item => (
                                    <button 
                                        key={item.id} 
                                        onClick={() => setActiveTab(item.id)} 
                                        className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-semibold transition-all duration-200 ${activeTab === item.id ? 'bg-slate-100 text-[#10B981]' : 'text-slate-500 hover:bg-slate-50'}`}
                                    >
                                        <div className="text-center shrink-0">
                                            {item.icon}
                                        </div>
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>

                        {/* Monitorização do Status e Reciclagem */}
                        <div className="space-y-4 pt-6 border-t border-slate-100">
                            <button onClick={() => setIsTrashOpen(true)} className="w-full flex items-center justify-between px-4 py-2 rounded-xl text-xs font-semibold text-slate-500 hover:bg-slate-50 transition-colors">
                                <span className="flex items-center gap-3">
                                    {ICONS.lixeira}
                                    Reciclagem
                                </span>
                                <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md text-[10px]">{lixeira.length}</span>
                            </button>

                            <div className="flex items-center justify-between px-4 text-[10px] font-semibold">
                                <span className="text-slate-400">Status Ligação</span>
                                <span className="flex items-center gap-1.5">
                                    <span className={`w-2 h-2 rounded-full ${statusConexao === 'conectado' ? 'bg-[#10B981]' : 'bg-[#EAB308]'}`}></span>
                                    {statusConexao === 'conectado' ? 'Ligado' : 'Aviso Ligação'}
                                </span>
                            </div>
                        </div>
                    </aside>

                    {/* Cabeçalho Compacto - Telemóvel / Mobile */}

                                            <select value={manualTx.banco_conta} onChange={(e) => setManualTx({...manualTx, banco_conta: e.target.value})} className="w-full px-3 py-2 border border-slate-200 rounded-xl outline-none bg-white">
                                                <option value="">Selecione...</option>
                                                {cartoes.map(c => <option key={c.nome} value={c.nome}>{c.nome}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => saveTransaction(manualTx)} className="w-full py-2.5 bg-[#10B981] text-white rounded-xl text-xs font-bold hover:bg-[#059669] transition-colors shadow-sm">
                                    Guardar Lançamento
                                </button>
                            </div>
                        </div>
                    )}

                    {/* PAINEL LATERAL: Reciclagem (Lixeira de segurança) */}
                    {isTrashOpen && (
                        <div className="fixed inset-0 bg-slate-950/20 backdrop-blur-[1px] z-[60] flex justify-end">
                            <div className="w-full max-w-xs bg-white h-full shadow-2xl p-6 flex flex-col justify-between animate-in slide-in-from-right duration-300">
                                <div>
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xs font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">{ICONS.lixeira} Reciclagem</h3>
                                        <button onClick={() => setIsTrashOpen(false)} className="text-slate-400 hover:text-slate-600">
                                            {ICONS.x}
                                        </button>
                                    </div>
                                    <div className="space-y-3 max-h-[75vh] overflow-y-auto no-scrollbar">
                                        {lixeira.map(i => (
                                            <div key={i.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100 text-[11px] relative group">
                                                <p className="font-bold text-slate-800">{i.descricao}</p>
                                                <p className="text-slate-500 font-semibold">R$ {Math.abs(parseBrazilianNumber(i.valor)).toLocaleString('pt-BR', {minimumFractionDigits: 2})} ({i.banco_conta})</p>
                                                <p className="text-[9px] text-slate-300 font-medium mt-1">Apagado a: {i.deleted_at}</p>
                                            </div>
                                        ))}
                                        {lixeira.length === 0 && (
                                            <div className="text-center py-10">
                                                <div className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-2 text-slate-300">{ICONS.lixeira}</div>
                                                <p className="text-[10px] text-slate-400 font-medium">A lixeira está vazia.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {lixeira.length > 0 && (
                                    <button onClick={clearTrash} className="w-full py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-xs font-bold transition-all text-center">
                                        Esvaziar Lixeira
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
