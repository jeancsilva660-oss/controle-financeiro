<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <style>
        /* Estilos e animações suaves personalizados */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-slideInRight {
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* Esconder barra de rolagem */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 antialiased">

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================

        const IconHome = ({ className }) => (

        // ==========================================
        // CONFIGURAÇÕES VISUAIS DE BANCOS (PASTEL)
        // ==========================================
        const BANK_THEMES = {
            'Itaú': {
                primary: 'emerald-600',
                bg: 'bg-amber-50/60',
                border: 'border-amber-100',
                text: 'text-amber-800',
                badge: 'bg-amber-100/80 text-amber-900',

            },
            'Bradesco': {

                border: 'border-rose-100',

                badge: 'bg-rose-100/80 text-rose-900',
                colorHex: '#fff1f2',
                accent: '#f43f5e'
            },
            'Nubank': {
                primary: 'emerald-600',
                bg: 'bg-purple-50/60',
                border: 'border-purple-100',
                text: 'text-purple-800',
                badge: 'bg-purple-100/80 text-purple-900',

            },
            'Santander': {
                primary: 'emerald-600',
                bg: 'bg-red-50/60',
                border: 'border-red-100',
                text: 'text-red-800',
                badge: 'bg-red-100/80 text-red-900',
                colorHex: '#fef2f2',
                accent: '#ef4444'
            },
            'Inter': {
                primary: 'emerald-600',
                bg: 'bg-orange-50/60',
                border: 'border-orange-100',
                text: 'text-orange-800',
                badge: 'bg-orange-100/80 text-orange-900',
                colorHex: '#fff7ed',
                accent: '#f97316'
            },
            'Caixa': {
                primary: 'emerald-600',
                bg: 'bg-sky-50/60',
                border: 'border-sky-100',
                text: 'text-sky-800',
                badge: 'bg-sky-100/80 text-sky-900',
                colorHex: '#f0f9ff',
                accent: '#0284c7'
            },
            'Banco do Brasil': {
                primary: 'emerald-600',
                bg: 'bg-yellow-50/60',
                border: 'border-yellow-100',
                text: 'text-yellow-800',
                badge: 'bg-yellow-100/80 text-yellow-900',
                colorHex: '#fffde6',
                accent: '#eab308'
            },
            'Default': {
                primary: 'emerald-600',
                bg: 'bg-emerald-50/40',
                border: 'border-emerald-100',
                text: 'text-emerald-800',
                badge: 'bg-emerald-100 text-emerald-900',
                colorHex: '#f0fdf4',
                accent: '#10b981'
            }
        };

        // ==========================================
        // DADOS E CATEGORIAS PADRÃO
        // ==========================================
        const INITIAL_CATEGORIES = [
            { tipo_config: 'Categoria', valor: 'Alimentação', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Saúde & Farmácia', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Moradia', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Transporte', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Lazer & Hobbies', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Vestuário', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Assinaturas & Serviços', tipo_fluxo: 'Despesa' },
            { tipo_config: 'Categoria', valor: 'Salário', tipo_fluxo: 'Receita' },
            { tipo_config: 'Categoria', valor: 'Rendimentos', tipo_fluxo: 'Receita' }
        ];

        const INITIAL_CARDS = [
            { nome: 'Itaú Click', banco: 'Itaú', tipo: 'Cartão de Crédito', dia_vencimento: 10, dono: 'Meu', saldo_inicial: 1500 },
            { nome: 'Nubank Roxo', banco: 'Nubank', tipo: 'Cartão de Crédito', dia_vencimento: 5, dono: 'Meu', saldo_inicial: 0 },
            { nome: 'Bradesco Prime', banco: 'Bradesco', tipo: 'Cartão de Crédito', dia_vencimento: 15, dono: 'Meu', saldo_inicial: 500 },
            { nome: 'Caixa Poupança', banco: 'Caixa', tipo: 'Conta Corrente/Outros', dia_vencimento: 0, dono: 'Meu', saldo_inicial: 2500 }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [lancamentos, setLancamentos] = useState(() => JSON.parse(localStorage.getItem('cf_lancamentos')) || []);
            const [cartoes, setCartoes] = useState(() => JSON.parse(localStorage.getItem('cf_cartoes')) || INITIAL_CARDS);
            const [categorias, setCategorias] = useState(() => JSON.parse(localStorage.getItem('cf_categorias')) || INITIAL_CATEGORIES);
            const [lixeira, setLixeira] = useState(() => JSON.parse(localStorage.getItem('cf_lixeira')) || []);

            const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem('cf_gemini_key') || '');
            const [sheetsUrl, setSheetsUrl] = useState(() => localStorage.getItem('cf_sheets_url') || '');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState('Modo Local');
            const [toast, setToast] = useState(null);

            // Filtros
            const [selectedBanco, setSelectedBanco] = useState('Todos');
            const [selectedDono, setSelectedDono] = useState('Todos');

            // Controle de Painéis
            const [isTrashOpen, setIsTrashOpen] = useState(false);
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [aiInput, setAiInput] = useState('');
            const [isAiAnalyzing, setIsAiAnalyzing] = useState(false);
            const [showConfirmation, setShowConfirmation] = useState(false);

            // Lançamento Pendente do Gemini / IA
            const [pendingTx, setPendingTx] = useState({
                descricao: '',
                valor: 0,
                data: new Date().toISOString().split('T')[0],
                categoria: 'Alimentação',
                banco_conta: 'Itaú',
                metodo: 'Crédito',
                cartao_dono: 'Meu',
                isParcelado: false,
                numParcelas: 3
            });

            const [newCard, setNewCard] = useState({ nome: '', banco: 'Itaú', tipo: 'Cartão de Crédito', dia_vencimento: 10, dono: 'Meu', saldo_inicial: 0 });
            const [newCategory, setNewCategory] = useState({ valor: '', tipo_fluxo: 'Despesa' });

            // Exibição de Toast Personalizado
            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                localStorage.setItem('cf_lancamentos', JSON.stringify(lancamentos));
            }, [lancamentos]);

            useEffect(() => {
                localStorage.setItem('cf_cartoes', JSON.stringify(cartoes));
            }, [cartoes]);

            useEffect(() => {
                localStorage.setItem('cf_categorias', JSON.stringify(categorias));
            }, [categorias]);

            useEffect(() => {
                localStorage.setItem('cf_lixeira', JSON.stringify(lixeira));
            }, [lixeira]);

            useEffect(() => {
                if (sheetsUrl) {
                    fetchDataFromSheets();
                }
            }, [sheetsUrl]);

            const fetchDataFromSheets = async () => {
                if (!sheetsUrl) return;
                setIsSyncing(true);
                setSyncStatus('Sincronizando...');
                try {
                    const response = await fetch(`${sheetsUrl}?action=getData`);
                    const res = await response.json();
                    if (res.success) {
                        if (res.data.lancamentos) setLancamentos(res.data.lancamentos);
                        if (res.data.cartoes) setCartoes(res.data.cartoes);
                        if (res.data.config) setCategorias(res.data.config);
                        if (res.data.lixeira) setLixeira(res.data.lixeira);
                        setSyncStatus('Nuvem Ativa');
                        showToast('Dados sincronizados com o Sheets!');
                    } else {
                        setSyncStatus('Erro de leitura');
                    }
                } catch (err) {
                    console.error(err);
                    setSyncStatus('Erro de Conexão');
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleSaveTransaction = async (tx) => {
                const generated = [];
                const baseVal = parseFloat(tx.valor);
                const resolvedValue = tx.metodo === 'Receita' ? Math.abs(baseVal) : -Math.abs(baseVal);

                if (tx.isParcelado && tx.metodo === 'Crédito') {
                    const parcelValue = parseFloat((resolvedValue / tx.numParcelas).toFixed(2));
                    const parcelGroupId = 'p_' + Date.now();
                    const targetCard = cartoes.find(c => c.nome === tx.banco_conta || c.banco === tx.banco_conta);
                    const vencDia = targetCard ? parseInt(targetCard.dia_vencimento) : 10;
                    let baseDate = new Date(tx.data + 'T00:00:00');

                    for (let i = 1; i <= tx.numParcelas; i++) {
                        let pDate = new Date(baseDate);
                        pDate.setMonth(baseDate.getMonth() + (i - 1));
                        if (vencDia > 0) pDate.setDate(vencDia);

                        generated.push({
                            id: `${parcelGroupId}_${i}`,
                            data: pDate.toISOString().split('T')[0],
                            descricao: `${tx.descricao} (${i}/${tx.numParcelas})`,
                            valor: parcelValue,
                            categoria: tx.categoria,
                            banco_conta: tx.banco_conta,
                            metodo: tx.metodo,
                            cartao_dono: tx.cartao_dono,
                            parcelamento_id: parcelGroupId,
                            parcela_atual: i,
                            total_parcelas: tx.numParcelas
                        });
                    }
                } else {
                    generated.push({
                        id: 't_' + Date.now(),
                        data: tx.data,
                        descricao: tx.descricao,
                        valor: resolvedValue,
                        categoria: tx.categoria,
                        banco_conta: tx.banco_conta,
                        metodo: tx.metodo,
                        cartao_dono: tx.cartao_dono,
                        parcelamento_id: '',
                        parcela_atual: '',
                        total_parcelas: ''
                    });
                }

                setLancamentos(prev => [...generated, ...prev]);
                showToast('Lançamento registrado com sucesso!');

                if (sheetsUrl) {
                    setIsSyncing(true);
                    try {
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'saveTransaction', transactions: generated })
                        });
                        setTimeout(fetchDataFromSheets, 1500);
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setIsSyncing(false);
                    }
                }
            };

            const handleDeleteTransaction = async (id) => {
                const itemToDelete = lancamentos.find(t => t.id === id);
                if (!itemToDelete) return;

                setLixeira(prev => [{ ...itemToDelete, data_exclusao: new Date().toISOString() }, ...prev]);
                setLancamentos(prev => prev.filter(t => t.id !== id));
                showToast('Lançamento enviado para a lixeira');

                if (sheetsUrl) {
                    setIsSyncing(true);
                    try {
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'deleteTransaction', id })
                        });
                        setTimeout(fetchDataFromSheets, 1500);
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setIsSyncing(false);
                    }
                }
            };

            const handleEmptyTrash = async () => {
                setLixeira([]);
                showToast('Lixeira limpa definitivamente!');
                setIsTrashOpen(false);

                if (sheetsUrl) {
                    setIsSyncing(true);
                    try {
                        await fetch(sheetsUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'emptyTrash' })
                        });
                        setTimeout(fetchDataFromSheets, 1500);
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setIsSyncing(false);
                    }
                }
            };

            const handleAnalyzeWithIA = async () => {
                if (!aiInput.trim()) return;
                setIsAiAnalyzing(true);

                const prompt = `Analise a compra: "${aiInput}".
                Use estritamente estas categorias cadastradas: ${categorias.map(c => c.valor).join(', ')}.
                Se for farmácia, Araújo, remédio, use obrigatoriamente a categoria "Saúde & Farmácia".
                Retorne estritamente um JSON no formato:
                {
                  "descricao": "Nome Amigável",
                  "valor": número positivo,
                  "categoria": "Nome da Categoria Correspondente",
                  "banco_conta": "Banco Detectado ou Itaú",
                  "metodo": "Crédito, Débito, PIX, Dinheiro ou Receita",
                  "isParcelado": true/false,
                  "numParcelas": número
                }`;

                if (!geminiKey) {
                    // Fallback analítico sem chave de API
                    setTimeout(() => {
                        const text = aiInput.toLowerCase();
                        let valor = 0.0;
                        const valMatch = text.match(/(?:r\$|rs)?\s*(\d+[\d,\.]*)/);
                        if (valMatch) valor = parseFloat(valMatch[1].replace(',', '.'));

                        let metodo = 'Débito';
                        if (text.includes('crédito') || text.includes('credito') || text.includes('parcelado') || text.match(/\d+\s*(?:x|vezes|parcelas)/)) metodo = 'Crédito';
                        else if (text.includes('pix') || text.includes('transferência')) metodo = 'PIX';
                        else if (text.includes('dinheiro')) metodo = 'Dinheiro';
                        else if (text.includes('ganhei') || text.includes('recebi') || text.includes('salário')) metodo = 'Receita';

                        let banco = 'Itaú';
                        if (text.includes('nubank') || text.includes('roxo')) banco = 'Nubank';
                        else if (text.includes('bradesco')) banco = 'Bradesco';
                        else if (text.includes('caixa')) banco = 'Caixa';
                        else if (text.includes('inter')) banco = 'Inter';
                        else if (text.includes('santander')) banco = 'Santander';

                        let categoria = 'Alimentação';
                        if (text.includes('araujo') || text.includes('araújo') || text.includes('remedio') || text.includes('bala') || text.includes('drogaria') || text.includes('farmacia') || text.includes('saude')) {
                            categoria = 'Saúde & Farmácia';
                        } else if (text.includes('sapato') || text.includes('tenis') || text.includes('roupa') || text.includes('mercadolivre')) {
                            categoria = 'Vestuário';
                        } else if (text.includes('aluguel') || text.includes('luz') || text.includes('agua')) {
                            categoria = 'Moradia';
                        } else if (text.includes('uber') || text.includes('combustivel') || text.includes('gasolina')) {
                            categoria = 'Transporte';
                        } else if (text.includes('netflix') || text.includes('cinema') || text.includes('cerveja')) {
                            categoria = 'Lazer & Hobbies';
                        }

                        let desc = aiInput.replace(/(\d+[\d,\.]*)/, '').replace(/reais|real|r\$/gi, '').trim();
                        desc = desc.charAt(0).toUpperCase() + desc.slice(1);

                        let isParcelado = text.includes('parcelado') || text.includes('vezes') || text.includes('x');
                        let numParcelas = 1;
                        const pMatch = text.match(/(\d+)\s*(?:vezes|parcelas|x)/);
                        if (pMatch) {
                            numParcelas = parseInt(pMatch[1]);
                            isParcelado = true;
                        }

                        setPendingTx({
                            descricao: desc || 'Lançamento Manual',
                            valor,
                            data: new Date().toISOString().split('T')[0],
                            categoria,
                            banco_conta: banco,
                            metodo,
                            cartao_dono: 'Meu',
                            isParcelado,
                            numParcelas
                        });
                        setIsAiAnalyzing(false);
                        setShowConfirmation(true);
                    }, 800);

                        headers: { 'Content-Type': 'application/json' },

                        })

                                                    <span className={`text-[9px] font-bold px-2 py-0.5 rounded ${bTheme.badge}`}>
                                                        {c.banco}
                                                    </span>
                                                </div>

                                                <div className="flex justify-between items-center text-xs mt-6">
                                                    <div>
                                                        <span className="block text-[8px] text-slate-400 uppercase font-bold">Dono</span>
                                                        <span className="font-semibold text-slate-700">{c.dono}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="block text-[8px] text-slate-400 uppercase font-bold">Saldo Inicial</span>
                                                        <span className="font-semibold text-slate-700">R$ {parseFloat(c.saldo_inicial || 0).toLocaleString('pt-BR')}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === 'configuracoes' && (
                            <div className="space-y-6 max-w-xl animate-in fade-in duration-500">
                                {/* Integração */}
                                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="text-xs font-bold text-slate-800 uppercase tracking-wider">Conectividade & Chaves</h3>
                                    
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 mb-1">Google Sheets Web App URL</label>
                                        <input 
                                            type="password" 
                                            placeholder="Cole aqui o URL gerado no Google Sheets..."
                                            value={sheetsUrl}
                                            onChange={(e) => {
                                                setSheetsUrl(e.target.value);
                                                localStorage.setItem('cf_sheets_url', e.target.value);
                                            }}
                                            className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-mono focus:outline-none focus:border-emerald-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 mb-1">Chave da API do Google Gemini</label>
                                        <input 
                                            type="password" 
                                            placeholder="Sua Gemini API Key"
                                            value={geminiKey}
                                            onChange={(e) => {
                                                setGeminiKey(e.target.value);
                                                localStorage.setItem('cf_gemini_key', e.target.value);
                                            }}
                                            className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-mono focus:outline-none focus:border-emerald-500"
                                        />
                                    </div>
                                </div>

                                {/* Categorias */}
                                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="text-xs font-bold text-slate-800 uppercase tracking-wider">Gerenciar Categorias</h3>
                                    
                                    <div className="flex gap-2">
                                        <input 
                                            type="text" 
                                            placeholder="Ex: Presentes"
                                            value={newCategory.valor}
                                            onChange={(e) => setNewCategory({...newCategory, valor: e.target.value})}
                                            className="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-none"
                                        />
                                        <select
                                            value={newCategory.tipo_fluxo}
                                            onChange={(e) => setNewCategory({...newCategory, tipo_fluxo: e.target.value})}
                                            className="px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-none"
                                        >
                                            <option value="Despesa">Despesa</option>
                                            <option value="Receita">Receita</option>
                                        </select>
                                        <button 
                                            onClick={handleSaveCategory}
                                            className="p-2 bg-slate-900 text-white hover:bg-slate-800 rounded-lg transition-colors"
                                        >
                                            <IconPlus className="w-4 h-4" />
                                        </button>
                                    </div>

                                    <div className="flex flex-wrap gap-1.5 pt-2">
                                        {categorias.map((cat, idx) => (
                                            <span key={idx} className="text-[10px] font-semibold bg-slate-100 text-slate-600 px-2 py-1 rounded-md">
                                                {cat.valor} <span className="text-[8px] text-slate-400 uppercase">({cat.tipo_fluxo[0]})</span>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* ==========================================
                        BARRA DE NAVEGAÇÃO INFERIOR (APENAS MOBILE - < MD BREAKPOINT)
                        ========================================== */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-2 flex items-center justify-between z-40">
                        {[
                            { id: 'dashboard', label: 'Home', icon: IconHome },
                            { id: 'historico', label: 'Extrato', icon: IconArrowRightLeft },
                            { id: 'cartoes', label: 'Cartões', icon: IconCreditCard },
                            { id: 'configuracoes', label: 'Ajustes', icon: IconSettings },
                        ].map(item => {
                            const Icon = item.icon;
                            const isAct = activeTab === item.id;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`flex flex-col items-center gap-1 p-1 ${isAct ? 'text-emerald-600' : 'text-slate-400'}`}
                                >
                                    <Icon className="w-4 h-4" />
                                    <span className="text-[9px] font-bold">{item.label}</span>
                                </button>
                            );
                        })}
                    </nav>

                    {/* ==========================================
                        BOTÃO FLUTUANTE DE IA (ACCESSIBLE TO TOUCH)
                        ========================================== */}
                    <div className="fixed bottom-16 md:bottom-6 right-6 z-50">
                        <button
                            onClick={() => {
                                setIsAiOpen(true);
                                setShowConfirmation(false);
                            }}
                            className="w-12 h-12 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full flex items-center justify-center shadow-lg shadow-emerald-600/30 hover:scale-105 active:scale-95 transition-all duration-300 relative"
                        >
                            <span className="absolute inset-0 rounded-full bg-emerald-500 animate-ping opacity-25" />
                            <IconSparkles className="w-5 h-5 animate-pulse" />
                        </button>
                    </div>

                    {}
                    {isTrashOpen && (
                        <div className="fixed inset-0 bg-slate-950/40 backdrop-blur-xs z-50 flex justify-end">
                            <div className="w-full max-w-sm bg-white h-full shadow-2xl p-6 flex flex-col justify-between animate-slideInRight">
                                <div>
                                    <div className="flex items-center justify-between pb-4 border-b border-slate-100 mb-4">
                                        <div className="flex items-center gap-2">
                                            <IconTrash2 className="w-4 h-4 text-rose-500" />
                                            <h3 className="font-bold text-slate-900 text-sm">Itens Deletados</h3>
                                        </div>
                                        <button onClick={() => setIsTrashOpen(false)} className="p-1 text-slate-400 hover:text-slate-600">
                                            <IconX className="w-5 h-5" />
                                        </button>
                                    </div>

                                    <div className="space-y-3 overflow-y-auto max-h-[75vh] pr-1">
                                        {lixeira.length === 0 ? (
                                            <p className="text-xs text-slate-400 text-center py-8">Sua lixeira está vazia.</p>
                                        ) : (
                                            lixeira.map(item => (
                                                <div key={item.id} className="p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs space-y-1">
                                                    <div className="flex justify-between items-start">
                                                        <p className="font-bold text-slate-800">{item.descricao}</p>
                                                        <span className="font-bold text-rose-600">R$ {Math.abs(item.valor).toLocaleString('pt-BR')}</span>
                                                    </div>
                                                    <div className="flex justify-between text-[9px] text-slate-400 font-medium">
                                                        <span>{item.banco_conta} • {item.metodo}</span>
                                                        <span>Removido em {item.data_exclusao?.split('T')[0]?.split('-')?.reverse()?.join('/')}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                {lixeira.length > 0 && (
                                    <button
                                        onClick={handleEmptyTrash}
                                        className="w-full py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs rounded-lg shadow mt-4 transition-colors"
                                    >
                                        Esvaziar Lixeira Permanentemente
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {}
                    {isAiOpen && (
                        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-xs flex items-center justify-center p-4 z-55">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-100 flex flex-col max-h-[90vh]">
                                
                                {/* Header */}
                                <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                    <span className="text-xs font-bold text-slate-800 flex items-center gap-2">
                                        <IconSparkles className="w-3.5 h-3.5 text-emerald-600" />
                                        Lançamento Inteligente
                                    </span>
                                    <button onClick={() => setIsAiOpen(false)} className="text-slate-400 hover:text-slate-600 p-1">
                                        <IconX className="w-4 h-4" />
                                    </button>
                                </div>

                                <div className="p-5 overflow-y-auto space-y-4">
                                    {!showConfirmation ? (
                                        // INPUT TEXTO LIVRE
                                        <div className="space-y-3">
                                            <textarea 
                                                rows={3}
                                                placeholder="Ex: 50 reais para pizza de calabresa no débito do meu Itaú..."
                                                value={aiInput}
                                                onChange={(e) => setAiInput(e.target.value)}
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-emerald-500 h-24"
                                            />
                                            <button
                                                onClick={handleAnalyzeWithIA}
                                                disabled={isAiAnalyzing || !aiInput.trim()}
                                                className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-xs shadow-md transition-all flex items-center justify-center gap-2"
                                            >
                                                {isAiAnalyzing ? (
                                                    <>
                                                        <IconLoader2 className="w-3.5 h-3.5" />
                                                        Lendo com Gemini...
                                                    </>
                                                ) : (
                                                    <>
                                                        <IconSparkles className="w-3.5 h-3.5" />
                                                        Processar Lançamento
                                                    </>
                                                )}
                                            </button>
                                        </div>
                                    ) : (
                                        // FORMULÁRIO DE CONFIRMAÇÃO
                                        <div className="space-y-3">
                                            <div className="p-3 bg-emerald-50 text-emerald-800 rounded-xl text-[10px] font-bold">
                                                ✨ IA detectou os seguintes parâmetros. Revise antes de salvar:
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 text-xs">
                                                <div className="col-span-2">
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Descrição</label>
                                                    <input 
                                                        type="text" 
                                                        value={pendingTx.descricao}
                                                        onChange={(e) => setPendingTx({...pendingTx, descricao: e.target.value})}
                                                        className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Valor (R$)</label>
                                                    <input 
                                                        type="number" 
                                                        value={pendingTx.valor}
                                                        onChange={(e) => setPendingTx({...pendingTx, valor: parseFloat(e.target.value) || 0})}
                                                        className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Data</label>
                                                    <input 
                                                        type="date" 
                                                        value={pendingTx.data}
                                                        onChange={(e) => setPendingTx({...pendingTx, data: e.target.value})}
                                                        className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Categoria</label>
                                                    <select
                                                        value={pendingTx.categoria}
                                                        onChange={(e) => setPendingTx({...pendingTx, categoria: e.target.value})}
                                                        className="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    >
                                                        {categorias.map((c, i) => (
                                                            <option key={i} value={c.valor}>{c.valor}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Banco / Conta</label>
                                                    <select
                                                        value={pendingTx.banco_conta}
                                                        onChange={(e) => setPendingTx({...pendingTx, banco_conta: e.target.value})}
                                                        className="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    >
                                                        {cartoes.map((c, i) => (
                                                            <option key={i} value={c.nome || c.banco}>{c.nome || c.banco}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Método</label>
                                                    <select
                                                        value={pendingTx.metodo}
                                                        onChange={(e) => setPendingTx({...pendingTx, metodo: e.target.value})}
                                                        className="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    >
                                                        <option value="Crédito">Crédito</option>
                                                        <option value="Débito">Débito</option>
                                                        <option value="PIX">PIX</option>
                                                        <option value="Dinheiro">Dinheiro</option>
                                                        <option value="Receita">Receita (Entrada)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-slate-400 mb-0.5">Responsável</label>
                                                    <select
                                                        value={pendingTx.cartao_dono}
                                                        onChange={(e) => setPendingTx({...pendingTx, cartao_dono: e.target.value})}
                                                        className="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg"
                                                    >
                                                        <option value="Meu">Meu</option>
                                                        {Array.from(new Set(cartoes.map(c => c.dono))).filter(d => d !== 'Meu').map(d => (
                                                            <option key={d} value={d}>{d}</option>
                                                        ))}
                                                    </select>
                                                </div>

                                                {pendingTx.metodo === 'Crédito' && (
                                                    <div className="col-span-2 pt-2 border-t border-slate-100 flex items-center justify-between">
                                                        <label className="flex items-center gap-2 cursor-pointer">
                                                            <input 
                                                                type="checkbox" 
                                                                checked={pendingTx.isParcelado}
                                                                onChange={(e) => setPendingTx({...pendingTx, isParcelado: e.target.checked})}
                                                                className="rounded text-emerald-600 focus:ring-emerald-500"
                                                            />
                                                            <span className="font-semibold text-slate-600">Parcelar compra?</span>
                                                        </label>
                                                        
                                                        {pendingTx.isParcelado && (
                                                            <div className="flex items-center gap-1">
                                                                <input 
                                                                    type="number" 
                                                                    value={pendingTx.numParcelas}
                                                                    onChange={(e) => setPendingTx({...pendingTx, numParcelas: parseInt(e.target.value) || 1})}
                                                                    className="w-12 px-2 py-1 bg-slate-50 border border-slate-200 rounded text-center"
                                                                    min="1"
                                                                />
                                                                <span className="text-[10px] text-slate-400">vezes</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="flex gap-2 pt-4">
                                                <button 
                                                    onClick={() => setShowConfirmation(false)}
                                                    className="flex-1 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg font-bold text-xs"
                                                >
                                                    Refazer Texto
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        handleSaveTransaction(pendingTx);
                                                        setIsAiOpen(false);
                                                        setAiInput('');
                                                    }}
                                                    className="flex-1 py-2 bg-emerald-600 text-white hover:bg-emerald-500 rounded-lg font-bold text-xs flex items-center justify-center gap-1"
                                                >
                                                    <IconCheck className="w-3.5 h-3.5" /> Confirmar
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Renderizar aplicação
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
